[project]
name = "rr-core"
version = "0.1.0"
description = "Core logic for rr (Research Ready) — no CLI dependency"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rr_core"]
