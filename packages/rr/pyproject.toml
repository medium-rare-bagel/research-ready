[project]
name = "rr"
version = "0.1.0"
description = "CLI tool for scaffolding and managing research project workspaces"
requires-python = ">=3.12"
dependencies = [
    "click>=8.3.1",
    "rr-core",
]

[project.scripts]
rr = "rr.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rr"]
